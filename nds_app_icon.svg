<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
    </filter>
  </defs>

  <!-- Sfondo: carta pergamena scura -->
  <rect width="1024" height="1024" fill="#1a1510"/>

  <!-- Grain sottile -->
  <rect width="1024" height="1024" fill="#c8a870" opacity="0.04" filter="url(#grain)"/>

  <!-- Cerchio esterno — quasi impalpabile -->
  <circle cx="512" cy="512" r="310" fill="none" stroke="#d4aa5a" stroke-width="2.5" opacity="0.18"/>

  <!-- Cerchio medio — oro principale -->
  <circle cx="512" cy="512" r="196" fill="none" stroke="#d4aa5a" stroke-width="3.2" opacity="0.68"/>

  <!-- Cerchio interno -->
  <circle cx="512" cy="512" r="74"  fill="none" stroke="#d4aa5a" stroke-width="2"   opacity="0.38"/>

  <!-- Punto centrale -->
  <circle cx="512" cy="512" r="16"  fill="#d4aa5a" opacity="0.88"/>
</svg>
