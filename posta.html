<style>
/* ── LAYOUT: two-column ── */
.posta-layout {
  display: grid;

  gap: 0;

}

/* ── SIDEBAR: conversation list ── */

}
.conv-item {

}
.conv-item:hover { background: rgba(138,104,40,0.04); }

}

.chat-panel {

}
.chat-panel-empty {

}
.chat-panel-empty p {

}

/* Chat header */

  border-bottom: 1px solid var(--rule2);

  gap: 16px; flex-wrap: wrap;
}
.chat-head-info {}
.chat-head-name {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 1.15rem; color: var(--ink);
}
.chat-head-arch {
  font-size: 0.7rem; color: var(--gold);

}

/* Translate toggle */
.translate-toggle {
  display: flex; align-items: center; gap: 10px;
  font-size: 0.68rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink-light);
  opacity: 0.5; cursor: pointer; user-select: none;
  transition: opacity 0.2s;
}
.translate-toggle:hover { opacity: 0.9; }
.translate-toggle input { display: none; }
.toggle-pill {
  width: 34px; height: 18px;
  background: var(--rule);
  border-radius: 9px; position: relative;
  transition: background 0.3s;
}
.toggle-pill::after {
  content:''; position: absolute;
  top:3px; left:3px; width:12px; height:12px;
  background: var(--ink-light); border-radius:50%;
  transition: all 0.3s;
}
.translate-toggle input:checked + .toggle-pill { background: var(--gold); }
.translate-toggle input:checked + .toggle-pill::after { left:19px; background:var(--ink); }

.msg-block { display: flex; flex-direction: column; }
.msg-block.sent { align-items: flex-end; }
.msg-block.received { align-items: flex-start; }

// ── ARCHETYPES ──
function getArchKey(ei,lo,et,pa){const avg=(ei+lo+et+pa)/4;if(ei>=75&&lo>=75&&et>=75&&pa>=70)return'lucido';if(ei>=75&&lo<55&&et>=70)return'custode';if(lo>=80&&ei<55&&pa<55)return'costruttore';if(et>=80&&ei>=65&&lo>=65)return'garante';if(pa>=80&&ei>=70)return'alchimista';if(et>=75&&pa>=75&&lo<60)return'morale';if(ei>=70&&pa>=70&&lo>=60)return'integrata';if(lo>=70&&et>=70&&ei<60)return'giurista';if(avg>=70)return'persona';if(avg>=55)return'transizione';return'mappa';}
const ARCH={it:{lucido:'Il Testimone Lucido',custode:'Il Custode Empatico',costruttore:'Il Costruttore di Sistemi',garante:'Il Garante Consapevole',alchimista:"Il Cercatore di Profondità",morale:'Il Testimone Morale',integrata:'La Presenza Integrata',giurista:"Il Giurista dell'Anima",persona:'La Persona Integrata',transizione:'Il Profilo in Transizione',mappa:'La Mappa da Disegnare'},en:{lucido:'The Lucid Witness',custode:'The Empathic Guardian',costruttore:'The System Builder',garante:'The Conscious Guarantor',alchimista:'The Depth Seeker',morale:'The Moral Witness',integrata:'The Integrated Presence',giurista:'The Soul Jurist',persona:'The Integrated Person',transizione:'The Transitional Profile',mappa:'The Map Yet to Be Drawn'},fr:{lucido:'Le Témoin Lucide',custode:'Le Gardien Empathique',costruttore:'Le Constructeur de Systèmes',garante:'Le Garant Conscient',alchimista:"Le Chercheur de Profondeur",morale:'Le Témoin Moral',integrata:'La Présence Intégrée',giurista:"Le Juriste de l'Âme",persona:'La Personne Intégrée',transizione:'Le Profil en Transition',mappa:'La Carte à Dessiner'},de:{lucido:'Der Luzide Zeuge',custode:'Der Empathische Hüter',costruttore:'Der Systemerbauer',garante:'Der Bewusste Garant',alchimista:'Der Tiefenforscher',morale:'Der Moralische Zeuge',integrata:'Die Integrierte Präsenz',giurista:'Der Seelen-Jurist',persona:'Die Integrierte Person',transizione:'Das Übergangsprofil',mappa:'Die noch zu zeichnende Karte'},es:{lucido:'El Testigo Lúcido',custode:'El Guardián Empático',costruttore:'El Constructor de Sistemas',garante:'El Garante Consciente',alchimista:'El Buscador de Profundidad',morale:'El Testigo Moral',integrata:'La Presencia Integrada',giurista:'El Jurista del Alma',persona:'La Persona Integrada',transizione:'El Perfil en Transición',mappa:'El Mapa por Dibujar'},pt:{lucido:'A Testemunha Lúcida',custode:'O Guardião Empático',costruttore:'O Construtor de Sistemas',garante:'O Garante Consciente',alchimista:'O Buscador de Profundidade',morale:'A Testemunha Moral',integrata:'A Presença Integrada',giurista:'O Jurista da Alma',persona:'A Pessoa Integrada',transizione:'O Perfil em Transição',mappa:'O Mapa por Desenhar'},zh:{lucido:'清醒的见证者',custode:'共情守护者',costruttore:'系统构建者',garante:'自觉保障者',alchimista:'深度探索者',morale:'道德见证者',integrata:'整合的存在',giurista:'灵魂法官',persona:'整合的人',transizione:'过渡期档案',mappa:'待描绘的地图'}};
function archName(s){ return s?(ARCH[currentLang]||ARCH.it)[getArchKey(s.ei||50,s.logic||50,s.ethics||50,s.pain||50)]:'—'; }

// ── TRANSLATION (Claude API) ──
const LANG_NAMES={it:'Italian',en:'English',fr:'French',de:'German',es:'Spanish',pt:'Portuguese',zh:'Chinese'};
const translateCache={};
const Translate={
  enabled: false,
  toggle(v){ this.enabled=v; Chat.rerender(); },
  async translate(text, fromLang, toLang){
    if(!text||fromLang===toLang) return null;
    const key=`${fromLang}_${toLang}_${text}`;
    if(translateCache[key]) return translateCache[key];
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          system:`You are a precise literary translator. Translate from ${LANG_NAMES[fromLang]||fromLang} to ${LANG_NAMES[toLang]||toLang}. Preserve emotional tone, register and style. Return ONLY the translated text.`,
          messages:[{role:'user',content:text}]
        })
      });
      const d=await r.json();
      const translated=d.content?.[0]?.text?.trim();
      if(translated){ translateCache[key]=translated; return translated; }
    }catch(e){}
    return null;
  }
};

// ── TIME FORMAT ──
function fmtTime(ts){
  if(!ts) return '';
  const d=typeof ts==='number'?new Date(ts):(ts.toDate?ts.toDate():new Date(ts));
  const now=new Date();
  if(now-d<86400000&&d.getDate()===now.getDate()) return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString([],{day:'numeric',month:'short'});
}
function escH(t){ return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

      // Get my scheda to find matches
      const sq=query(collection(window.__db,'schede'),where('username','==',session.username));
      const ssnap=await getDocs(sq);
      if(!ssnap.empty){ matched=ssnap.docs[0].data().matched||[]; }
      // Also check messages for any conversations
      const mq=query(collection(window.__db,'messages'),where('fromId','==',session.username));
      const msnap=await getDocs(mq);
      msnap.docs.forEach(d=>{ const toId=d.data().toId; if(toId&&!matched.includes(toId)) matched.push(toId); });
      const rq=query(collection(window.__db,'messages'),where('toId','==',session.username));
      const rsnap=await getDocs(rq);
      rsnap.docs.forEach(d=>{ const fromId=d.data().fromId; if(fromId&&!matched.includes(fromId)) matched.push(fromId); });
    } else {
      const msgs=JSON.parse(localStorage.getItem('nds_messages')||'[]');
      msgs.forEach(m=>{
        if(m.fromId===session.username&&!matched.includes(m.toId)) matched.push(m.toId);
        if(m.toId===session.username&&!matched.includes(m.fromId)) matched.push(m.fromId);
      });
    }
  }catch(e){}

  if(matched.length===0){
    list.innerHTML=`<div class="conv-empty-msg">${tr('conv_empty').replace(/\n/g,'<br>')}</div>`;
    return;
  }

  list.innerHTML='';
  for(const partnerId of matched){
    // Get partner scheda
    let partnerScheda=null;
    try{
      if(window.__db){
        const {collection,query,where,getDocs}=window.__fb;
        const pq=query(collection(window.__db,'schede'),where('username','==',partnerId));
        const psnap=await getDocs(pq);
        if(!psnap.empty) partnerScheda=psnap.docs[0].data();
      }else{
        const all=JSON.parse(localStorage.getItem('nds_schede')||'[]');
        partnerScheda=all.find(s=>s.username===partnerId)||null;
      }
    }catch(e){}

    // Get last message
    let lastMsg=null;
    try{
      const msgs=await getMessages(session.username, partnerId);
      lastMsg=msgs[msgs.length-1]||null;
    }catch(e){}

    const item=document.createElement('div');
    item.className='conv-item';
    item.innerHTML=`
      <div class="conv-item-name">${partnerId}</div>
      <div class="conv-item-preview">${lastMsg?lastMsg.text.slice(0,40)+'…':'—'}</div>
      <div class="conv-item-time">${lastMsg?fmtTime(lastMsg.ts):''}</div>
    `;
    item.onclick=()=>openChat(partnerId, partnerScheda, item);
    list.appendChild(item);
  }
}

async function getMessages(userA, userB){
  const chatId=[userA,userB].sort().join('__');
  if(window.__db){
    const {collection,query,where,orderBy,getDocs}=window.__fb;
    try{
      const q=query(collection(window.__db,'messages'),where('chatId','==',chatId),orderBy('ts','asc'));
      const snap=await getDocs(q);
      return snap.docs.map(d=>({id:d.id,...d.data()}));
    }catch(e){
      // Fallback without orderBy if index missing
      const q2=query(collection(window.__db,'messages'),where('chatId','==',chatId));
      const snap2=await getDocs(q2);
      return snap2.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.ts||0)-(b.ts||0));
    }
  }
  const all=JSON.parse(localStorage.getItem('nds_messages')||'[]');
  return all.filter(m=>m.chatId===chatId).sort((a,b)=>a.ts-b.ts);
}

// ── OPEN CHAT ──
async function openChat(partnerId, partnerScheda, itemEl){
  document.querySelectorAll('.conv-item').forEach(i=>i.classList.remove('active'));
  if(itemEl) itemEl.classList.add('active');

  currentPartner={id:partnerId, scheda:partnerScheda};
  document.getElementById('chat-partner-name').textContent=partnerId;
  document.getElementById('chat-partner-arch').textContent=partnerScheda?archName(partnerScheda):'';

  document.getElementById('chat-empty').style.display='none';
  const activeEl=document.getElementById('chat-active');
  activeEl.style.display='flex';

  if(chatUnsub){ chatUnsub(); chatUnsub=null; }
  await Chat.load();

  // Real-time listener
  if(window.__db){
    const {collection,query,where,orderBy,onSnapshot}=window.__fb;
    const chatId=[session.username,partnerId].sort().join('__');
    try{
      const q=query(collection(window.__db,'messages'),where('chatId','==',chatId),orderBy('ts','asc'));
      chatUnsub=onSnapshot(q,snap=>{
        currentMessages=snap.docs.map(d=>({id:d.id,...d.data()}));
        Chat.render();
      });
    }catch(e){
      // No real-time fallback
    }
  }
}

// ── CHAT ──
const Chat={
  async load(){
    if(!currentPartner) return;
    currentMessages=await getMessages(session.username, currentPartner.id);
    this.render();
  },

  render(){
    const container=document.getElementById('chat-messages');
    const wasAtBottom=container.scrollHeight-container.clientHeight<=container.scrollTop+80;
    container.innerHTML='';

    if(currentMessages.length===0){
      container.innerHTML=`<div style="text-align:center;padding:60px 0;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ink-light);opacity:0.35;">${currentPartner?.id||''}</div>`;
      return;
    }

    currentMessages.forEach(msg=>{
      const isMine=msg.fromId===session.username;
      const block=document.createElement('div');
      block.className=`msg-block ${isMine?'sent':'received'}`;
      block.dataset.msgid=msg.id||'';

      const needsTranslation=!isMine && Translate.enabled && msg.fromLang && msg.fromLang!==currentLang;

      block.innerHTML=`
        <div class="msg-meta">${isMine?(session.username||''):currentPartner.id} · ${fmtTime(msg.ts)}</div>
        <div class="msg-letter">
          <div class="msg-text">${escH(msg.text)}</div>
          ${needsTranslation?`<div class="msg-translating">${tr('translating')}</div>`:''}
        </div>
      `;
      container.appendChild(block);

      if(needsTranslation){
        this.translateBubble(block, msg.text, msg.fromLang, currentLang);
      }
    });

    if(wasAtBottom) container.scrollTop=container.scrollHeight;
  },

  async translateBubble(block, text, fromLang, toLang){
    const hint=block.querySelector('.msg-translating');
    if(!hint) return;
    const translated=await Translate.translate(text, fromLang, toLang);
    if(translated){
      const msgText=block.querySelector('.msg-text');
      msgText.innerHTML=escH(translated);
      hint.outerHTML=`<div class="msg-original"><div class="msg-original-label">${tr('original')}</div>${escH(text)}</div>`;
    } else { hint.remove(); }
  },

  rerender(){ this.render(); },

  async send(){
    if(!currentPartner||!session.username) return;
    const input=document.getElementById('composer-input');
    const text=input.value.trim();
    if(!text) return;

    const btn=document.querySelector('.composer-send');
    btn.disabled=true;
    input.value=''; input.style.height='auto';

    const chatId=[session.username,currentPartner.id].sort().join('__');
    const msg={
      chatId, text,
      fromId:session.username,
      toId:currentPartner.id,
      fromLang:currentLang,
      ts:Date.now(), read:false
    };

    try{
      if(window.__db){
        const {collection,addDoc,serverTimestamp}=window.__fb;
        await addDoc(collection(window.__db,'messages'),{...msg,ts:serverTimestamp()});
      }else{
        const all=JSON.parse(localStorage.getItem('nds_messages')||'[]');
        all.push({...msg,id:'m_'+Date.now()});
        localStorage.setItem('nds_messages',JSON.stringify(all));
        currentMessages=await getMessages(session.username,currentPartner.id);
        this.render();
      }
    }catch(e){ showToast('Errore nell\'invio.'); }

    btn.disabled=false;
    input.focus();
  }
};

// ── INIT ──
async function init(){
  const s=sessionStorage.getItem('nds_session');
  if(!s){ window.location.href='login.html'; return; }
  session=JSON.parse(s);

  buildLangSwitcher();
  applyLang();
  await loadConversations();
}

document.addEventListener('firebaseReady', init);
ndsWatermark('composer-input-wrap');
setTimeout(init, 3000);

// ── NDS WATERMARK ──
function ndsWatermark(containerId) {
  const wrap = document.getElementById(containerId);
  if(!wrap) return;
  wrap.classList.add('composer-watermark-wrap');
  const positions = [
    {top:'8px',  left:'12px',  size:28},
    {top:'50%',  right:'14px', size:24, transform:'translateY(-50%)'},
    {bottom:'8px',left:'50%',  size:22, transform:'translateX(-50%)'},
    {top:'8px',  right:'16px', size:26},
    {bottom:'10px',right:'12px',size:20},
  ];
  const pick = positions[Math.floor(Math.random()*positions.length)];
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 100 100');
  svg.setAttribute('width', pick.size);
  svg.setAttribute('height', pick.size);
  svg.setAttribute('aria-hidden','true');
  svg.classList.add('nds-watermark');
  Object.entries(pick).forEach(([k,v])=>{ if(k!=='size') svg.style[k]=v; });
  svg.innerHTML = '<circle cx="50" cy="50" r="38" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5"/><circle cx="50" cy="50" r="24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="1"/><circle cx="50" cy="50" r="9" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.6"/><circle cx="50" cy="50" r="3" fill="currentColor" opacity="1"/>';
  wrap.style.position='relative';
  wrap.insertBefore(svg, wrap.firstChild);
}
